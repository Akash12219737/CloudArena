name: Deploy Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*"

# ── Required GitHub Secrets ────────────────────────────────────────────────────
# DOCKERHUB_USERNAME   — Your Docker Hub username
# DOCKERHUB_TOKEN      — Docker Hub access token
# KUBE_CONFIG          — base64-encoded kubeconfig for your EKS cluster
#   Generate: cat ~/.kube/config | base64 -w 0

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudarena-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudarena-frontend

jobs:
  # ── Build and push Docker images to Docker Hub ────────────────────────────────
  build-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes (AWS EKS) ───────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap/
          kubectl apply -f k8s/rbac/
          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress/
          kubectl apply -f k8s/cronjob/

      - name: Update backend image
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          kubectl set image deployment/cloudarena-backend \
            backend=${{ env.BACKEND_IMAGE }}:${IMAGE_TAG} \
            -n cloudarena

      - name: Update frontend image
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          kubectl set image deployment/cloudarena-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG} \
            -n cloudarena

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/cloudarena-backend -n cloudarena --timeout=300s
          kubectl rollout status deployment/cloudarena-frontend -n cloudarena --timeout=300s

      - name: Verify pods are running
        run: |
          kubectl get pods -n cloudarena
          echo "✅ Deployment complete!"
