---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudarena-ingress
  namespace: cloudarena
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - cloudarena.yourdomain.com
      secretName: cloudarena-tls
  rules:
    - host: cloudarena.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cloudarena-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudarena-frontend
                port:
                  number: 80
