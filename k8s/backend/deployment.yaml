---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudarena-backend
  namespace: cloudarena
  labels:
    app: cloudarena-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudarena-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloudarena-backend
        tier: backend
    spec:
      serviceAccountName: cloudarena-backend-sa
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USERNAME/cloudarena-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cloudarena-config
            - secretRef:
                name: cloudarena-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudarena-backend
  namespace: cloudarena
spec:
  selector:
    app: cloudarena-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
