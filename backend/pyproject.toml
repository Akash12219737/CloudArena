[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes
select = ["E", "F"]
ignore = [
    "E501",  # line too long — handled by formatter, not linter
]
# Allow unused imports marked with # noqa: F401
per-file-ignores = {}

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
